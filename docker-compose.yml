services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://fleet:fleet@db:5432/fleet_api
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  sidecar-example:
    build:
      context: .
      dockerfile: Dockerfile.sidecar
    environment:
      FLEET_API_URL: http://api:8000
      FLEET_AGENT_ID: example-agent
      FLEET_AGENT_PRIVATE_KEY_PATH: /keys/agent.pem
      FLEET_EXECUTOR_COMMAND: "echo task-handler-placeholder"
      FLEET_HEARTBEAT_INTERVAL: "30"
    depends_on:
      api:
        condition: service_healthy
    # volumes:
    #   - ./keys/example-agent.pem:/keys/agent.pem:ro

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fleet
      POSTGRES_PASSWORD: fleet
      POSTGRES_DB: fleet_api
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleet -d fleet_api"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
